name: Build & test
run-name: ${{ inputs.reason || '' }}

on:
  push:
    branches:
      - '**'
  pull_request:
    types: [opened, edited, synchronize]
  workflow_dispatch:
    inputs:
      reason:
        description: Run reason (shown in run name)
        type: string
  repository_dispatch:
    types: [docker-image-updated]

jobs:
  Build-Linux:
    strategy:
      fail-fast: false
      matrix:
        compiler: [gcc, clang]
        test_libs: [tl_preinstalled, tl_missing]
        qt: [qt_5.15.2, qt_6.8.3]
        build_type: [Debug, Release]

    runs-on: ubuntu-latest

    container:
      image: ihordrachuk/id-build-env:linux-${{ matrix.compiler }}-${{ matrix.test_libs }}-${{ matrix.qt }}-default
      options: --workdir ${{ github.workspace }}

    if: "!contains(github.event.head_commit.message, 'CI skip') && !contains(github.event.head_commit.message, 'Skip CI')"
    timeout-minutes: 10

    steps:
      - name: "Set env values"
        shell: bash
        run: |
         echo "CORES=$(nproc --all)" >> $GITHUB_ENV
         echo "WORKSPACE=$(pwd)" >> $GITHUB_ENV

      - uses: actions/checkout@v6
        with:
          path: ${{github.workspace}}/src
          submodules: true

      - name: Build
        working-directory: ${{github.workspace}}
        env:
          QT_QPA_PLATFORM: 'minimal'
        shell: bash
        run: |
          GTEST_SEARCH_MODE=$([[ "${{ matrix.test_libs }}" == "tl_missing" ]] && echo "Skip" || echo "Force")

          cmake -DUTILS_QT_LONG_INTERVALS=ON -DUTILS_QT_NO_GUI_TESTS=ON -DUTILS_QT_WERROR=ON -DUTILS_QT_ENABLE_TESTS=ON -DUTILS_QT_ENABLE_BENCHMARK=ON -DUTILS_QT_GTEST_SEARCH_MODE:STRING=$GTEST_SEARCH_MODE -DCMAKE_BUILD_TYPE="${{matrix.build_type}}" -G "Unix Makefiles" -S "./src" -B "./build"
          cmake --build "./build" --config "${{matrix.build_type}}" -j "${{env.CORES}}"
          cd ./build/tests
          ctest --no-tests=error --rerun-failed --output-on-failure --timeout 45 -C "${{matrix.build_type}}"


  Build-Windows:
    strategy:
      fail-fast: false
      matrix:
        compiler_arch: [x64]
        qt: [5.15.2, 6.8.3]
        build_type: [Debug, Release]
        include:
          - compiler_arch: Win32
            qt: 5.15.2
            build_type: Debug

    runs-on: windows-latest

    if: "!contains(github.event.head_commit.message, 'CI skip') && !contains(github.event.head_commit.message, 'Skip CI')"
    timeout-minutes: 30

    steps:
      - name: Install Qt
        if: ${{ matrix.qt != 'qt_no' }}
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ matrix.qt }}
          host: windows
          target: desktop
          arch: ${{ matrix.compiler_arch == 'Win32' && 'win32_msvc2019' || (matrix.qt == '6.8.3' && 'win64_msvc2022_64' || 'win64_msvc2019_64') }}
          dir: ${{github.workspace}}/qt
          cache: true
          setup-python: true

      - name: Install Ninja
        run: choco install ninja -y

      - name: Setup MSVC environment
        uses: TheMrMilchmann/setup-msvc-dev@v4
        with:
          arch: ${{ matrix.compiler_arch == 'Win32' && 'x86' || 'x64' }}

      - uses: actions/checkout@v6
        with:
          path: ${{github.workspace}}/src
          submodules: true

      - name: Build
        working-directory: ${{github.workspace}}
        shell: bash
        run: |
          cmake -DUTILS_QT_LONG_INTERVALS=ON -DUTILS_QT_WERROR=ON -DUTILS_QT_ENABLE_TESTS=ON -DUTILS_QT_ENABLE_BENCHMARK=ON -DCMAKE_BUILD_TYPE="${{matrix.build_type}}" -G "Ninja" -S "./src" -B "./build"
          cmake --build "./build" --config "${{matrix.build_type}}"
          cd ./build/tests
          ctest --no-tests=error --rerun-failed --output-on-failure --timeout 45 -C "${{matrix.build_type}}"


  Build-MacOS:
    strategy:
      fail-fast: false
      matrix:
        qt: [5.15.2, 6.8.3]
        build_type: [Debug, Release]

    runs-on: macos-latest

    if: "!contains(github.event.head_commit.message, 'CI skip') && !contains(github.event.head_commit.message, 'Skip CI')"
    timeout-minutes: 30

    steps:
      - name: "Set env values"
        shell: bash
        run: |
          echo "CORES=$(sysctl -n hw.ncpu)" >> $GITHUB_ENV

      - name: Install Qt
        if: ${{ matrix.qt != 'qt_no' }}
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ matrix.qt }}
          host: mac
          target: desktop
          arch: clang_64
          dir: ${{github.workspace}}/qt
          cache: true
          setup-python: true

      - name: "Add Qt to PATH"
        if: ${{ matrix.qt != 'qt_no' }}
        shell: bash
        run: |
          echo "${{github.workspace}}/qt" >> $GITHUB_PATH

      - uses: actions/checkout@v6
        with:
          path: ${{github.workspace}}/src
          submodules: true

      - name: Build
        working-directory: ${{github.workspace}}
        shell: bash
        run: |
          cmake -DCMAKE_OSX_ARCHITECTURES=x86_64 -DUTILS_QT_LONG_INTERVALS=ON -DUTILS_QT_WERROR=ON -DUTILS_QT_ENABLE_TESTS=ON -DUTILS_QT_ENABLE_BENCHMARK=ON -DCMAKE_BUILD_TYPE="${{matrix.build_type}}" -G "Unix Makefiles" -S "./src" -B "./build"
          cmake --build "./build" --config "${{matrix.build_type}}" -j "${{env.CORES}}"
          cd ./build/tests
          ctest --no-tests=error --rerun-failed --output-on-failure --timeout 180 -C "${{matrix.build_type}}"


  CodeChecker:
    if: "!contains(github.event.head_commit.message, 'CI skip') && !contains(github.event.head_commit.message, 'Skip CI')"
    runs-on: [ubuntu-22.04]

    container:
      image: ihordrachuk/id-build-env:linux-clang-tl_missing-qt_6.8.3-codechecker
      options: --workdir ${{ github.workspace }}

    steps:
      - name: "Set environment variables"
        working-directory: ${{github.workspace}}
        shell: bash
        run: |
         echo "WORKSPACE=$(pwd)" >> $GITHUB_ENV

      - name: "Check out repository"
        uses: actions/checkout@v6
        with:
          path: ${{github.workspace}}/src
          submodules: true

      - name: "Prepare analysis - build"
        working-directory: ${{github.workspace}}
        run: |
          mkdir build
          echo "-/usr/include/*" >> build/skipfile.txt
          echo "-/opt/Qt/*" >> build/skipfile.txt
          echo "-$(pwd)/build*" >> build/skipfile.txt
          cmake -DCMAKE_EXPORT_COMPILE_COMMANDS=ON -DCMAKE_BUILD_TYPE="Debug" -S "./src" -B "./build" -G "Unix Makefiles"
          cmake --build "./build" --config "Debug" -j $(nproc --all)

      - name: "Run the analysis"
        working-directory: ${{github.workspace}}
        run: |
          mkdir codechecker-reports
          # Also 'cppcheck' can be added to analyzers list
          CodeChecker analyze -i build/skipfile.txt build/compile_commands.json -j $(nproc --all) -o report --analyzers clang-tidy clangsa
          CodeChecker parse ./report -i build/skipfile.txt --trim-path-prefix "$(pwd)/src" | tee ./codechecker-reports/results.txt || true
          CodeChecker parse ./report -i build/skipfile.txt --trim-path-prefix "$(pwd)/src" -e html -o ./codechecker-reports/html > /dev/null || true
          CodeChecker parse ./report -i build/skipfile.txt --trim-path-prefix "$(pwd)/src" > /dev/null && touch ./ccOK || true

      - name: "Upload the results"
        uses: actions/upload-artifact@v7
        with:
          name: "CodeChecker report"
          path: ${{github.workspace}}/codechecker-reports

      - name: "Break build if CodeChecker reported any findings"
        working-directory: ${{github.workspace}}
        run: |
          [ -f "./ccOK" ] || exit 1
          exit 0


  Done:
    needs: [Build-Linux, Build-Windows, Build-MacOS, CodeChecker]
    runs-on: [ubuntu-latest]
    steps:
    - name: "Done"
      shell: bash
      run: |
       echo "Done"
       exit 0
